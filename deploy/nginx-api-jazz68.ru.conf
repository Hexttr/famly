# Famly API — api.jazz68.ru
# HTTPS uses Let's Encrypt paths; run certbot if certs are missing:
#   sudo certbot --nginx -d api.jazz68.ru --non-interactive --agree-tos --email admin@jazz68.ru --redirect

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name api.jazz68.ru;

    ssl_certificate /etc/letsencrypt/live/api.jazz68.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.jazz68.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120;
        proxy_send_timeout 120;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name api.jazz68.ru;

    location / {
        return 301 https://$host$request_uri;
    }
}
