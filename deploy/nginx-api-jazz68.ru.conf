# Famly API — api.jazz68.ru
# Install:
#   sudo cp ~/famly/deploy/nginx-api-jazz68.ru.conf /etc/nginx/sites-available/famly-api
#   sudo ln -sf /etc/nginx/sites-available/famly-api /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d api.jazz68.ru
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name api.jazz68.ru;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120;
        proxy_send_timeout 120;
    }
}
