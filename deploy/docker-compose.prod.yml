services:
  famly-backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: famly-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      JWT_SECRET: ${JWT_SECRET}
      MONETIZATION_ENABLED: "false"
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      RUSTORE_WEBHOOK_SECRET: ${RUSTORE_WEBHOOK_SECRET:-}
      DATABASE_URL: jdbc:h2:/data/famly;DB_CLOSE_DELAY=-1
    volumes:
      - famly_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

volumes:
  famly_data:
