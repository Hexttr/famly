services:
  postgres:
    image: postgres:16-alpine
    container_name: famly-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: famly
      POSTGRES_USER: famly
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-famly_dev_password}
    volumes:
      - famly_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U famly -d famly"]
      interval: 10s
      timeout: 5s
      retries: 5

  famly-backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: famly-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      RUSTORE_WEBHOOK_SECRET: ${RUSTORE_WEBHOOK_SECRET:-}
      DATABASE_URL: jdbc:postgresql://postgres:5432/famly?user=famly&password=${POSTGRES_PASSWORD:-famly_dev_password}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

volumes:
  famly_pg:
